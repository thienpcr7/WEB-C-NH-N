<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THIỆN VUA APP - HỆ THỐNG AI THỰC CHIẾN</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <style>
        @layer base {
            :root {
                --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
                --font-display: "Playfair Display", serif;
                --font-montserrat: "Montserrat", sans-serif;
                --color-gold: #C9A24D;
                --color-gold-light: #E6B65C;
            }
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        .gold-text {
            background: linear-gradient(to right, #C9A24D, #F7E7B4, #C9A24D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(201, 162, 77, 0.2);
        }

        .neon-glow {
            box-shadow: 0 0 15px rgba(201, 162, 77, 0.3);
        }

        .neon-glow-strong {
            box-shadow: 0 0 30px rgba(201, 162, 77, 0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #C9A24D;
            border-radius: 10px;
        }

        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        /* Lucide Icon Fix */
        .lucide {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Playfair Display', 'serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        gold: {
                            DEFAULT: '#C9A24D',
                            light: '#E6B65C',
                            dark: '#A67C2E',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useContext, createContext } = React;
        const { motion, AnimatePresence, useScroll, useTransform } = FramerMotion;
        const { 
            LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area 
        } = Recharts;

        // --- Lucide Icon Component ---
        const Icon = ({ name, size = 24, className = "", ...props }) => {
            const [svg, setSvg] = useState('');
            
            useEffect(() => {
                const icon = lucide.icons[name];
                if (icon) {
                    const svgString = lucide.createIcons({
                        icons: { [name]: icon },
                        attrs: {
                            class: `lucide lucide-${name} ${className}`,
                            width: size,
                            height: size,
                            ...props
                        }
                    });
                }
                // Fallback: Use lucide.createIcons on the element after render
                lucide.createIcons();
            }, [name, size, className]);

            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // --- Constants ---
        const APP_ECOSYSTEM = [
            { id: 1, name: "SIÊU APP ĐA VŨ TRỤ V1", price: "11.900K", category: "Siêu App & Quản Trị", description: "Nền tảng quản trị kinh doanh đa kênh tích hợp AI thế hệ mới.", image: "https://lh3.googleusercontent.com/d/1eTzWhC2BC9XsFuB0ybk9yLcVnmB5t4gM", details: ["Quản lý đa kênh tập trung", "Tự động hóa quy trình CSKH", "Phân tích dữ liệu thông minh", "Tích hợp AI tạo nội dung"] },
            { id: 2, name: "SIÊU APP ĐA VŨ TRỤ V2", price: "16.900K", category: "Siêu App & Quản Trị", description: "Phiên bản nâng cấp với khả năng tự động hóa quy trình doanh nghiệp toàn diện.", image: "https://lh3.googleusercontent.com/d/15_rVnZjcsfhGUVOCH-3BoivJ0pjIJw4P", details: ["Tự động hóa 90% quy trình", "Hệ thống báo cáo Real-time", "AI dự báo xu hướng thị trường", "Kết nối API không giới hạn"] },
            { id: 3, name: "1000 KOL AI", price: "990K", category: "KOL AI & Bán Hàng", description: "Sở hữu đội ngũ 1000 KOL ảo sẵn sàng quảng bá thương hiệu 24/7.", image: "https://lh3.googleusercontent.com/d/1WaeFYGl4_a1zIy9j03bOtg9odLA9pgTX", details: ["1000 Nhân vật AI độc bản", "Tự động đăng bài đa nền tảng", "Tương tác khách hàng tự động", "Không bao giờ scandal"] },
            { id: 4, name: "1000 KOL AI BÁN HÀNG", price: "1.990K", category: "KOL AI & Bán Hàng", description: "KOL AI chuyên sâu về chốt đơn và livestream bán hàng tự động.", image: "https://lh3.googleusercontent.com/d/10CW0JLgmDobp_FZsGLdFQ_6tYBt1v5c7", details: ["Livestream 24/7 không nghỉ", "Chốt đơn tự động qua Chatbot", "Giọng nói AI truyền cảm hứng", "Tối ưu hóa tỷ lệ chuyển đổi"] },
            { id: 5, name: "KỊCH BẢN VEO3/SORA 2", price: "990K", category: "Sáng Tạo Nội Dung & Video", description: "Tạo hàng nghìn kịch bản video ngắn triệu view chỉ với 1 chạm.", image: "https://lh3.googleusercontent.com/d/1ugOyq59vNzmIVo0ALVSZPsYd_va3r0MK" },
            { id: 168, name: "TRUYỀN NHÂN NGƯỜI KẾ VỊ", price: "1.990K", category: "Tư Duy & Phát Triển", description: "Ứng dụng AI giúp tối ưu hóa thu nhập và quản lý tài chính thông minh.", image: "https://lh3.googleusercontent.com/d/1SZs6E4k2ojehy8TVo1eK-1ptzoqD3zIX" }
        ];

        // --- Services ---
        const affiliateService = {
            STORAGE_KEY: 'thien_vua_app_user',
            ALL_USERS_KEY: 'thien_vua_app_all_users',
            ALL_PURCHASES_KEY: 'thien_vua_app_all_purchases',
            STATS_KEY: 'thien_vua_app_stats',

            getUser() {
                const data = localStorage.getItem(this.STORAGE_KEY);
                return data ? JSON.parse(data) : null;
            },
            setUser(user) {
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(user));
            },
            logout() {
                localStorage.removeItem(this.STORAGE_KEY);
            },
            getAllUsers() {
                const data = localStorage.getItem(this.ALL_USERS_KEY);
                return data ? JSON.parse(data) : [];
            },
            saveUserToAll(user) {
                const users = this.getAllUsers();
                if (!users.find(u => u.email === user.email)) {
                    users.push(user);
                    localStorage.setItem(this.ALL_USERS_KEY, JSON.stringify(users));
                }
            },
            getAllPurchases() {
                const data = localStorage.getItem(this.ALL_PURCHASES_KEY);
                return data ? JSON.parse(data) : [];
            },
            savePurchase(purchase) {
                const purchases = this.getAllPurchases();
                purchases.push(purchase);
                localStorage.setItem(this.ALL_PURCHASES_KEY, JSON.stringify(purchases));
            },
            getStats() {
                const data = localStorage.getItem(this.STATS_KEY);
                return data ? JSON.parse(data) : { clicks: 1240, conversions: 45, totalRevenue: 150000000, totalCommission: 45000000, pendingCommission: 5000000, paidCommission: 40000000 };
            },
            getRecords() {
                return [
                    { id: 'REC-001', productName: 'SIÊU APP V1', amount: 11900000, commission: 3570000, percentage: 30, status: 'paid', createdAt: '2024-03-01' },
                    { id: 'REC-002', productName: '1000 KOL AI', amount: 990000, commission: 297000, percentage: 30, status: 'pending', createdAt: '2024-03-05' }
                ];
            },
            generateAffiliateLink(user) {
                return `${window.location.origin}${window.location.pathname}?ref=${user.affiliateCode}`;
            }
        };

        const editorService = {
            DRAFT_KEY: 'thien_vua_app_site_draft',
            PUBLISHED_KEY: 'thien_vua_app_site_published',
            getDefaultData() {
                return {
                    theme: { primaryColor: '#c9a24d', secondaryColor: '#ffffff', backgroundColor: '#000000', textColor: '#9ca3af', fontFamily: 'Inter', borderRadius: '1rem' },
                    header: { logoUrl: 'https://i.postimg.cc/hh2HK1Gf/LOGO-VUA-APP.png', menuItems: [{ id: '1', label: 'Hệ sinh thái', link: '#he-sinh-thai' }, { id: '2', label: 'Khóa học', link: '#khoa-hoc' }, { id: '3', label: 'Kết quả', link: '#ket-qua' }, { id: '4', label: 'Liên hệ', link: '#lien-he' }] },
                    hero: { title: 'GIÚP CHỦ DOANH NGHIỆP X3 DOANH SỐ BẰNG CÔNG NGHỆ AI THỰC CHIẾN', subtitle: 'Huấn luyện AI thực chiến | Tự động hóa marketing & bán hàng | Xây dòng tiền bền vững 24/7. Không cần giỏi công nghệ, không cần biết code.', buttonText: 'NHẬN LỘ TRÌNH AI MIỄN PHÍ', mediaType: 'image', mediaUrl: 'https://lh3.googleusercontent.com/d/1BNKO6qd0Mmhwpm7n54mUucZjy4pS86AN' },
                    ecosystem: { title: 'SIÊU HỆ SINH THÁI APP AI', subtitle: 'Những ứng dụng AI đỉnh cao giúp bạn thống trị thị trường và tối ưu hóa lợi nhuận tuyệt đối.' },
                    course: { title: 'TRUYỀN NHÂN NGƯỜI KẾ VỊ TẠO RA 1000 APP MỘT CHẠM KIẾM TIỀN TỰ ĐỘNG', price: '3.990$', videoUrl: 'https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-world-map-with-glowing-lines-32624-large.mp4', imageUrl: 'https://lh3.googleusercontent.com/d/1SZs6E4k2ojehy8TVo1eK-1ptzoqD3zIX', details: ['Hệ thống kiếm tiền tự động 100%', 'Tặng kèm 10 App AI đã code sẵn', 'Cố vấn trực tiếp từ Thiện Vua App', 'Bảo hành thu nhập trọn đời'] }
                };
            },
            getDraft() {
                const data = localStorage.getItem(this.DRAFT_KEY);
                return data ? JSON.parse(data) : this.getDefaultData();
            },
            saveDraft(data) { localStorage.setItem(this.DRAFT_KEY, JSON.stringify(data)); },
            publish(data) { localStorage.setItem(this.PUBLISHED_KEY, JSON.stringify(data)); }
        };

        // --- Context ---
        const EditorContext = createContext();
        const EditorProvider = ({ children }) => {
            const [isEditMode, setIsEditMode] = useState(false);
            const [siteData, setSiteData] = useState(editorService.getDraft());
            const [selectedElement, setSelectedElement] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);

            useEffect(() => {
                const user = affiliateService.getUser();
                setIsAdmin(user?.role === 'admin');
            }, []);

            const saveDraft = () => editorService.saveDraft(siteData);
            const publish = () => { editorService.publish(siteData); setIsEditMode(false); };

            return (
                <EditorContext.Provider value={{ isEditMode, setIsEditMode, siteData, setSiteData, selectedElement, setSelectedElement, saveDraft, publish, isAdmin }}>
                    {children}
                </EditorContext.Provider>
            );
        };
        const useEditor = () => useContext(EditorContext);

        // --- Components ---
        const EditableText = ({ id, value, onChange, className = '', as: Tag = 'p' }) => {
            const { isEditMode, selectedElement, setSelectedElement } = useEditor();
            const isSelected = selectedElement === id;
            if (!isEditMode) return <Tag className={className}>{value}</Tag>;
            return (
                <div className={`relative group cursor-text ${isSelected ? 'ring-2 ring-gold ring-offset-4 ring-offset-black rounded-lg' : 'hover:ring-1 hover:ring-gold/50 rounded-lg'}`} onClick={(e) => { e.stopPropagation(); setSelectedElement(id); }}>
                    <Tag contentEditable suppressContentEditableWarning onBlur={(e) => onChange(e.currentTarget.textContent || '')} className={`${className} outline-none focus:bg-white/5 transition-colors`}>{value}</Tag>
                </div>
            );
        };

        const EditableImage = ({ id, src, onChange, className = '', alt = '' }) => {
            const { isEditMode, selectedElement, setSelectedElement } = useEditor();
            const isSelected = selectedElement === id;
            if (!isEditMode) return <img src={src} alt={alt} className={className} referrerPolicy="no-referrer" />;
            return (
                <div className={`relative group cursor-pointer overflow-hidden ${isSelected ? 'ring-4 ring-gold ring-offset-4 ring-offset-black rounded-2xl' : 'hover:ring-2 hover:ring-gold/50 rounded-2xl'}`} onClick={(e) => { e.stopPropagation(); setSelectedElement(id); }}>
                    <img src={src} alt={alt} className={`${className} transition-transform group-hover:scale-105`} referrerPolicy="no-referrer" />
                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <div className="bg-gold text-black p-3 rounded-full shadow-2xl"><Icon name="settings" size={24} /></div>
                    </div>
                </div>
            );
        };

        const SectionHeader = ({ title, subtitle, className, align = 'center', onTitleChange, onSubtitleChange }) => (
            <div className={`mb-12 ${align === 'center' ? "text-center" : "text-left"} ${className}`}>
                <EditableText id={`section-title-${title}`} as="h2" value={title} onChange={onTitleChange || (() => {})} className="text-4xl md:text-6xl font-display font-bold gold-text mb-4 uppercase tracking-tighter" />
                {subtitle && <EditableText id={`section-subtitle-${title}`} as="p" value={subtitle} onChange={onSubtitleChange || (() => {})} className="text-gray-400 text-lg md:text-xl max-w-3xl mx-auto font-montserrat" />}
                <div className={`h-1 bg-gradient-to-r from-gold to-transparent mt-6 w-24 ${align === 'center' ? "mx-auto" : ""}`} />
            </div>
        );

        const AppCard = ({ app, onBuy }) => (
            <motion.div whileHover={{ y: -10 }} className="glass-card rounded-2xl overflow-hidden group relative">
                <div className="aspect-video overflow-hidden relative bg-white/5">
                    <img src={app.image} alt={app.name} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" referrerPolicy="no-referrer" loading="lazy" />
                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-6">
                        <button onClick={() => onBuy(app)} className="w-full py-3 bg-gold text-black font-bold rounded-xl flex items-center justify-center gap-2 hover:bg-gold-light transition-colors uppercase text-xs">Sở Hữu Ngay <Icon name="arrow-right" size={16} /></button>
                    </div>
                </div>
                <div className="p-4">
                    <div className="flex justify-between items-start mb-1">
                        <h3 className="text-lg font-bold font-montserrat text-white group-hover:text-gold transition-colors line-clamp-2 h-[3.5rem] flex items-center">{app.name}</h3>
                        <span className="text-gold font-bold text-base">{app.price}</span>
                    </div>
                    <p className="text-gray-400 text-[11px] line-clamp-1 mb-3">{app.description}</p>
                    <button onClick={() => onBuy(app)} className="flex items-center gap-2 text-gold font-bold text-[10px] hover:underline uppercase tracking-tighter"><Icon name="shopping-cart" size={14} /> Chi tiết & Thanh toán</button>
                </div>
            </motion.div>
        );

        const AuthModal = ({ isOpen, onClose, onSuccess }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [formData, setFormData] = useState({ email: '', password: '', name: '', phone: '', bankName: '', bankAccount: '', bankNumber: '' });
            if (!isOpen) return null;
            const handleSubmit = (e) => {
                e.preventDefault();
                if (isLogin && formData.email.toUpperCase() === 'THIEN') {
                    const admin = { id: 'ADMIN-001', name: 'THIỆN QUẢN TRỊ', email: 'THIEN', role: 'admin', affiliateCode: 'ADMIN', createdAt: new Date().toISOString() };
                    affiliateService.setUser(admin); onSuccess(admin); onClose(); return;
                }
                const user = { id: Math.random().toString(36).substr(2, 9), name: formData.name || 'Thành viên VIP', email: formData.email, role: 'user', affiliateCode: Math.random().toString(36).substr(2, 6).toUpperCase(), createdAt: new Date().toISOString() };
                affiliateService.setUser(user); affiliateService.saveUserToAll(user); onSuccess(user); onClose();
            };
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/90 backdrop-blur-sm" onClick={onClose} />
                    <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="relative w-full max-w-md glass-card rounded-[2.5rem] border-gold/30 p-8">
                        <button onClick={onClose} className="absolute top-6 right-6 text-gray-400 hover:text-white"><Icon name="x" size={24} /></button>
                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-display font-black gold-text uppercase tracking-tighter">{isLogin ? 'Đăng Nhập' : 'Đăng Ký Đối Tác'}</h2>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {!isLogin && <input required type="text" placeholder="Họ và tên" className="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} />}
                            <input required type="email" placeholder="Email" className="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white" value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} />
                            <input required type="password" placeholder="Mật khẩu" className="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white" value={formData.password} onChange={(e) => setFormData({...formData, password: e.target.value})} />
                            <button type="submit" className="w-full py-4 bg-gold text-black font-black rounded-xl hover:bg-gold-light transition-all neon-glow mt-6 uppercase">{isLogin ? 'Đăng Nhập Ngay' : 'Đăng Ký Đối Tác'}</button>
                        </form>
                        <div className="mt-8 text-center"><button onClick={() => setIsLogin(!isLogin)} className="text-sm text-gray-400 hover:text-gold">{isLogin ? 'Chưa có tài khoản? Đăng ký ngay' : 'Đã có tài khoản? Đăng nhập'}</button></div>
                    </motion.div>
                </div>
            );
        };

        const PaymentModal = ({ isOpen, onClose, product }) => {
            if (!isOpen) return null;
            const handlePayment = (method) => {
                alert(`Cảm ơn bạn đã quan tâm đến ${product.name}. Hệ thống đang xử lý thanh toán qua ${method}.`);
                affiliateService.savePurchase({ productName: product.name, price: product.price, customerName: 'Khách hàng', customerEmail: 'guest@example.com', paymentMethod: method, timestamp: new Date().toISOString(), referralCode: 'NONE' });
                onClose();
            };
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/90 backdrop-blur-sm" onClick={onClose} />
                    <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="relative w-full max-w-2xl glass-card rounded-[2.5rem] border-gold/30 p-8 max-h-[90vh] overflow-y-auto custom-scrollbar">
                        <button onClick={onClose} className="absolute top-6 right-6 text-gray-400 hover:text-white"><Icon name="x" size={24} /></button>
                        <h2 className="text-3xl font-display font-black gold-text uppercase tracking-tighter mb-6">Thanh Toán Sở Hữu</h2>
                        <div className="grid md:grid-cols-2 gap-8 mb-8">
                            <div className="space-y-4">
                                <img src={product.image || 'https://picsum.photos/seed/app/800/450'} className="w-full aspect-video object-cover rounded-2xl border border-gold/20" />
                                <h3 className="text-xl font-bold text-white uppercase">{product.name}</h3>
                                <p className="text-gold text-2xl font-black">{product.price}</p>
                            </div>
                            <div className="space-y-6">
                                <p className="text-xs text-gray-400 font-bold uppercase tracking-widest">Chọn phương thức thanh toán</p>
                                <button onClick={() => handlePayment('Chuyển khoản')} className="w-full p-6 bg-white/5 border border-white/10 rounded-2xl hover:border-gold transition-all flex items-center gap-4 group">
                                    <div className="p-3 bg-gold/10 rounded-xl group-hover:bg-gold/20"><Icon name="credit-card" className="text-gold" /></div>
                                    <div className="text-left"><p className="text-white font-bold">Chuyển khoản ngân hàng</p><p className="text-[10px] text-gray-500 uppercase">Xử lý trong 5-10 phút</p></div>
                                </button>
                                <button onClick={() => handlePayment('Ví điện tử')} className="w-full p-6 bg-white/5 border border-white/10 rounded-2xl hover:border-gold transition-all flex items-center gap-4 group">
                                    <div className="p-3 bg-purple-500/10 rounded-xl group-hover:bg-purple-500/20"><Icon name="wallet" className="text-purple-500" /></div>
                                    <div className="text-left"><p className="text-white font-bold">Ví điện tử (Momo/ZaloPay)</p><p className="text-[10px] text-gray-500 uppercase">Xử lý tức thì</p></div>
                                </button>
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        };

        const AdminDashboard = ({ user, onLogout }) => {
            const { isEditMode, setIsEditMode } = useEditor();
            const [users, setUsers] = useState(affiliateService.getAllUsers());
            const [purchases, setPurchases] = useState(affiliateService.getAllPurchases());
            const formatCurrency = (amount) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount || 0);
            return (
                <div className="min-h-screen bg-black pt-24 pb-20 px-6">
                    <div className="max-w-7xl mx-auto space-y-8">
                        <div className="flex justify-between items-center">
                            <h1 className="text-4xl font-display font-black gold-text uppercase">Hệ Thống Quản Trị</h1>
                            <div className="flex gap-4">
                                <button onClick={() => setIsEditMode(!isEditMode)} className={`px-4 py-2 border rounded-xl font-bold text-sm ${isEditMode ? 'bg-gold text-black' : 'text-gold border-gold/20'}`}>{isEditMode ? 'ĐANG CHỈNH SỬA' : 'CHỈNH SỬA WEBSITE'}</button>
                                <button onClick={onLogout} className="p-3 bg-white/5 border border-white/10 rounded-xl text-gray-400 hover:text-red-500"><Icon name="log-out" size={20} /></button>
                            </div>
                        </div>
                        <div className="grid grid-cols-3 gap-6">
                            <div className="glass-card p-6 rounded-3xl">
                                <p className="text-[10px] text-gray-500 font-black uppercase mb-1">Thành viên</p>
                                <p className="text-3xl font-black text-white">{users.length}</p>
                            </div>
                            <div className="glass-card p-6 rounded-3xl">
                                <p className="text-[10px] text-gray-500 font-black uppercase mb-1">Đơn hàng</p>
                                <p className="text-3xl font-black text-white">{purchases.length}</p>
                            </div>
                            <div className="glass-card p-6 rounded-3xl">
                                <p className="text-[10px] text-gray-500 font-black uppercase mb-1">Doanh thu</p>
                                <p className="text-3xl font-black text-gold">{formatCurrency(150000000)}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AffiliateDashboard = ({ user, onLogout }) => {
            const stats = affiliateService.getStats();
            const records = affiliateService.getRecords();
            const affiliateLink = affiliateService.generateAffiliateLink(user);
            return (
                <div className="min-h-screen bg-black pt-24 pb-20 px-6">
                    <div className="max-w-7xl mx-auto space-y-8">
                        <div className="flex justify-between items-center">
                            <h1 className="text-4xl font-display font-black gold-text uppercase">Đối Tác Tiếp Thị</h1>
                            <button onClick={onLogout} className="p-3 bg-white/5 border border-white/10 rounded-xl text-gray-400 hover:text-red-500"><Icon name="log-out" size={20} /></button>
                        </div>
                        <div className="glass-card p-8 rounded-[2.5rem] border-gold/30">
                            <h2 className="text-xl font-bold text-white uppercase mb-4">Link Tiếp Thị Của Bạn</h2>
                            <div className="flex gap-4">
                                <div className="flex-1 bg-black/40 border border-white/10 rounded-2xl px-6 py-4 text-gray-300 font-mono text-sm">{affiliateLink}</div>
                                <button onClick={() => { navigator.clipboard.writeText(affiliateLink); alert('Đã sao chép!'); }} className="px-8 py-4 bg-gold text-black font-black rounded-2xl uppercase text-xs">Sao Chép Link</button>
                            </div>
                        </div>
                        <div className="grid grid-cols-4 gap-6">
                            {[ { label: 'Lượt Nhấp', value: stats.clicks }, { label: 'Đơn Hàng', value: stats.conversions }, { label: 'Doanh Thu', value: '150M' }, { label: 'Hoa Hồng', value: '45M' } ].map((item, i) => (
                                <div key={i} className="glass-card p-6 rounded-3xl"><p className="text-[10px] text-gray-500 font-black uppercase mb-1">{item.label}</p><p className="text-2xl font-black text-white">{item.value}</p></div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const ADMIN_VISUAL_EDITOR_CORE = () => {
            const { isEditMode, setIsEditMode, saveDraft, publish, isAdmin, selectedElement, setSelectedElement } = useEditor();
            if (!isAdmin) return null;
            return ReactDOM.createPortal(
                <div className="fixed inset-0 pointer-events-none z-[9999]">
                    <div className="absolute top-6 left-1/2 -translate-x-1/2 pointer-events-auto">
                        <div className="flex items-center gap-2 bg-black/90 backdrop-blur-2xl border-2 border-gold/30 p-2 rounded-2xl shadow-2xl">
                            <button onClick={() => setIsEditMode(!isEditMode)} className={`flex items-center gap-2 px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all ${isEditMode ? 'bg-gold text-black' : 'text-gray-400 hover:text-white'}`}>
                                {isEditMode ? <Icon name="eye-off" size={16} /> : <Icon name="eye" size={16} />}
                                {isEditMode ? 'EXIT EDIT MODE' : 'ENTER EDIT MODE'}
                            </button>
                            {isEditMode && (
                                <div className="flex items-center gap-2">
                                    <div className="w-px h-6 bg-white/10 mx-2" />
                                    <button onClick={saveDraft} className="px-4 py-2.5 rounded-xl text-xs font-black uppercase text-gray-400 hover:text-white">SAVE DRAFT</button>
                                    <button onClick={publish} className="px-6 py-2.5 bg-emerald-500 text-white rounded-xl text-xs font-black uppercase shadow-lg">PUBLISH LIVE</button>
                                </div>
                            )}
                        </div>
                    </div>
                    {isEditMode && selectedElement && (
                        <div className="absolute top-24 right-6 bottom-24 w-[400px] bg-black/95 backdrop-blur-3xl border-2 border-gold/20 rounded-[2.5rem] shadow-2xl pointer-events-auto flex flex-col overflow-hidden">
                            <div className="p-8 border-b border-white/10 flex justify-between items-center bg-gold/5">
                                <h3 className="text-lg font-black text-white uppercase">Inspector</h3>
                                <button onClick={() => setSelectedElement(null)} className="text-gray-400 hover:text-white"><Icon name="x" size={24} /></button>
                            </div>
                            <div className="flex-1 p-8 space-y-8 overflow-y-auto custom-scrollbar">
                                <div className="space-y-4">
                                    <label className="text-[10px] text-gold font-black uppercase tracking-widest">Text Content</label>
                                    <textarea className="w-full bg-white/5 border-2 border-white/10 rounded-2xl p-5 text-sm text-white focus:outline-none focus:border-gold min-h-[150px]" placeholder="Enter content..." />
                                </div>
                                <div className="space-y-4">
                                    <label className="text-[10px] text-gold font-black uppercase tracking-widest">Media Engine</label>
                                    <div className="border-2 border-dashed border-gold/20 rounded-[2rem] p-10 flex flex-col items-center justify-center gap-4 bg-gold/5 cursor-pointer">
                                        <Icon name="upload" size={40} className="text-gold" />
                                        <p className="text-xs text-white font-black uppercase">Upload New Media</p>
                                    </div>
                                </div>
                            </div>
                            <div className="p-8 border-t border-white/10 bg-white/5 flex gap-4">
                                <button onClick={() => setSelectedElement(null)} className="flex-1 py-4 bg-white/10 text-white text-xs font-black uppercase rounded-2xl">CANCEL</button>
                                <button className="flex-1 py-4 bg-gold text-black text-xs font-black uppercase rounded-2xl shadow-xl">APPLY CHANGES</button>
                            </div>
                        </div>
                    )}
                    {isEditMode && (
                        <div className="absolute bottom-10 left-10 pointer-events-none">
                            <div className="flex items-center gap-4 bg-gold px-6 py-3 rounded-full shadow-2xl">
                                <div className="w-3 h-3 bg-black rounded-full animate-pulse" />
                                <span className="text-black font-black text-xs uppercase tracking-widest">Visual Edit Mode Active</span>
                            </div>
                        </div>
                    )}
                </div>,
                document.body
            );
        };

        // --- Main App ---
        const App = () => {
            const { siteData, setSiteData, isEditMode } = useEditor();
            const [isPaymentOpen, setIsPaymentOpen] = useState(false);
            const [isAuthOpen, setIsAuthOpen] = useState(false);
            const [showAffiliateDashboard, setShowAffiliateDashboard] = useState(false);
            const [currentUser, setCurrentUser] = useState(affiliateService.getUser());
            const [selectedProduct, setSelectedProduct] = useState({ name: '', price: '' });
            const containerRef = useRef(null);
            
            const { scrollYProgress } = useScroll();
            const backgroundY = useTransform(scrollYProgress, [0, 1], ['0%', '20%']);

            useEffect(() => {
                const user = affiliateService.getUser();
                if (user) setCurrentUser(user);
                lucide.createIcons();
            }, []);

            const handleBuy = (app) => { setSelectedProduct(app); setIsPaymentOpen(true); };
            const handleLogout = () => { affiliateService.logout(); setCurrentUser(null); setShowAffiliateDashboard(false); };
            const handleAffiliateClick = () => { if (currentUser) { setShowAffiliateDashboard(true); window.scrollTo({ top: 0, behavior: 'smooth' }); } else { setIsAuthOpen(true); } };

            if (showAffiliateDashboard && currentUser) {
                return (
                    <div className="relative min-h-screen bg-black">
                        <nav className="fixed top-0 left-0 w-full z-50 px-6 py-4 backdrop-blur-md border-b border-white/5 bg-black/50">
                            <div className="max-w-7xl mx-auto flex justify-between items-center">
                                <div className="flex items-center gap-3 cursor-pointer" onClick={() => setShowAffiliateDashboard(false)}>
                                    <div className="w-10 h-10 rounded-full border-2 border-gold p-1"><img src="https://i.postimg.cc/hh2HK1Gf/LOGO-VUA-APP.png" className="w-full h-full object-contain rounded-full" /></div>
                                    <span className="text-xl font-display font-black gold-text tracking-tighter">THIỆN VUA APP</span>
                                </div>
                                <button onClick={() => setShowAffiliateDashboard(false)} className="px-6 py-2 bg-white/5 text-white font-bold rounded-full border border-white/10 hover:bg-white/10 transition-all text-sm uppercase">Quay lại trang chủ</button>
                            </div>
                        </nav>
                        {currentUser.role === 'admin' ? <AdminDashboard user={currentUser} onLogout={handleLogout} /> : <AffiliateDashboard user={currentUser} onLogout={handleLogout} />}
                    </div>
                );
            }

            return (
                <div ref={containerRef} className="relative min-h-screen font-sans selection:bg-gold selection:text-black">
                    <motion.div style={{ y: backgroundY }} className="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_50%_50%,#1e1b4b_0%,#000_100%)]" />
                    <nav className="fixed top-0 left-0 w-full z-50 px-6 py-4 backdrop-blur-md border-b border-white/5">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-12 h-12 rounded-full border-2 border-gold p-1 neon-glow">
                                    <EditableImage id="site-logo" src={siteData.header.logoUrl} onChange={(src) => setSiteData({ ...siteData, header: { ...siteData.header, logoUrl: src } })} className="w-full h-full object-contain rounded-full" />
                                </div>
                                <EditableText id="site-name" as="span" value="THIỆN VUA APP" onChange={() => {}} className="text-2xl font-display font-black gold-text tracking-tighter" />
                            </div>
                            <div className="hidden md:flex items-center gap-8">
                                {['Hệ sinh thái', 'Khóa học', 'Kết quả', 'Liên hệ'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase().replace(' ', '-')}`} className="text-sm font-bold uppercase tracking-widest text-gray-400 hover:text-gold transition-colors">{item}</a>
                                ))}
                                <button onClick={handleAffiliateClick} className="flex items-center gap-2 text-sm font-bold uppercase tracking-widest text-gold hover:text-gold-light transition-colors"><Icon name="bar-chart-3" size={18} /> TIẾP THỊ LIÊN KẾT</button>
                                <button onClick={() => handleBuy(siteData.course)} className="px-6 py-2 bg-gold text-black font-bold rounded-full hover:bg-gold-light transition-all neon-glow uppercase text-xs">Bắt đầu ngay</button>
                            </div>
                        </div>
                    </nav>

                    <div className="w-full pt-20 px-6 max-w-7xl mx-auto">
                        <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} className="relative w-full aspect-[21/9] md:aspect-[25/7] rounded-[2.5rem] overflow-hidden border-2 border-gold/30 shadow-2xl">
                            <EditableImage id="top-banner" src={siteData.hero.mediaUrl} onChange={(src) => setSiteData({ ...siteData, hero: { ...siteData.hero, mediaUrl: src } })} className="w-full h-full object-cover" />
                            <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent" />
                        </motion.div>
                    </div>

                    <section className="relative pt-20 pb-20 px-6 overflow-hidden">
                        <div className="max-w-7xl mx-auto text-center">
                            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-gold/10 border border-gold/20 text-gold text-xs font-bold uppercase tracking-widest mb-10"><Icon name="zap" size={14} /> Kỷ Nguyên AI 2026</motion.div>
                            <EditableText id="hero-title" as="h1" value={siteData.hero.title} onChange={(val) => setSiteData({ ...siteData, hero: { ...siteData.hero, title: val } })} className="text-5xl md:text-7xl lg:text-8xl font-display font-black leading-[1.1] mb-10 tracking-tighter" />
                            <EditableText id="hero-subtitle" as="p" value={siteData.hero.subtitle} onChange={(val) => setSiteData({ ...siteData, hero: { ...siteData.hero, subtitle: val } })} className="text-xl md:text-2xl text-gray-400 mb-14 font-montserrat leading-relaxed max-w-4xl mx-auto" />
                            <div className="flex flex-col sm:flex-row gap-6 justify-center">
                                <button onClick={() => handleBuy(siteData.course)} className="px-12 py-6 bg-gold text-black font-black rounded-2xl flex items-center justify-center gap-3 hover:bg-gold-light transition-all shadow-2xl shadow-gold/30 group text-xl uppercase">Sở Hữu Lộ Trình AI <Icon name="arrow-right" size={24} /></button>
                                <button className="px-12 py-6 bg-white/5 text-white font-black rounded-2xl border border-white/10 hover:bg-white/10 transition-all text-xl uppercase">Xem Kết Quả Học Viên</button>
                            </div>
                        </div>
                    </section>

                    <section id="he-sinh-thai" className="py-32 px-6 bg-white/[0.02]">
                        <div className="max-w-7xl mx-auto">
                            <SectionHeader title={siteData.ecosystem.title} subtitle={siteData.ecosystem.subtitle} onTitleChange={(val) => setSiteData({ ...siteData, ecosystem: { ...siteData.ecosystem, title: val } })} onSubtitleChange={(val) => setSiteData({ ...siteData, ecosystem: { ...siteData.ecosystem, subtitle: val } })} />
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {APP_ECOSYSTEM.map((app) => <AppCard key={app.id} app={app} onBuy={handleBuy} />)}
                            </div>
                        </div>
                    </section>

                    <footer className="py-20 px-6 border-t border-white/5 bg-black">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-4 gap-12">
                            <div className="col-span-2 space-y-6">
                                <div className="flex items-center gap-3"><div className="w-10 h-10 rounded-full border-2 border-gold p-1"><img src="https://i.postimg.cc/hh2HK1Gf/LOGO-VUA-APP.png" className="w-full h-full object-contain rounded-full" /></div><span className="text-2xl font-display font-black gold-text tracking-tighter">THIỆN VUA APP</span></div>
                                <p className="text-gray-400 max-w-md font-montserrat">Tiên phong trong việc thương mại hóa trí tuệ nhân tạo tại Việt Nam. Giúp hàng nghìn doanh nghiệp bứt phá doanh thu bằng công nghệ AI thực chiến.</p>
                            </div>
                            <div className="space-y-6"><h4 className="text-gold font-black uppercase tracking-widest text-sm">Liên Hệ</h4><div className="space-y-4 text-gray-400 text-sm"><p className="flex items-center gap-3"><Icon name="mail" size={18} className="text-gold" /> thienvuaapp@gmail.com</p><p className="flex items-center gap-3"><Icon name="phone" size={18} className="text-gold" /> 090.000.0000</p></div></div>
                            <div className="space-y-6"><h4 className="text-gold font-black uppercase tracking-widest text-sm">Kết Nối</h4><div className="flex gap-4"><button className="w-12 h-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-gold hover:text-black transition-all"><Icon name="facebook" size={20} /></button><button className="w-12 h-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-gold hover:text-black transition-all"><Icon name="youtube" size={20} /></button></div></div>
                        </div>
                    </footer>

                    <ADMIN_VISUAL_EDITOR_CORE />
                    <PaymentModal isOpen={isPaymentOpen} onClose={() => setIsPaymentOpen(false)} product={selectedProduct} />
                    <AuthModal isOpen={isAuthOpen} onClose={() => setIsAuthOpen(false)} onSuccess={(user) => { setCurrentUser(user); setShowAffiliateDashboard(true); }} />
                </div>
            );
        };

        const Root = () => (
            <EditorProvider>
                <App />
            </EditorProvider>
        );

        ReactDOM.render(<Root />, document.getElementById('root'));
    </script>
</body>
</html>
